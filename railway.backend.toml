[build]
builder = "DOCKERFILE"
watchPatterns = [
  "backend/**",
  "pyproject.toml",
  "uv.lock",
  "main.py",
]

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
