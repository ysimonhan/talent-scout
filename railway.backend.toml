[build]
builder = "DOCKERFILE"
watchPatterns = [
  "backend/**",
  "pyproject.toml",
  "uv.lock",
  "main.py",
]

[deploy]
startCommand = "sh -c 'uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
