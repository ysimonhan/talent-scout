services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sourcing_pgvector
    environment:
      POSTGRES_DB: sourcing_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
